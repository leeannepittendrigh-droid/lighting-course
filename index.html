<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Commercial Lighting Essentials</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💡</text></svg>">

  <!-- Docsify base theme — provides the sidebar/layout structure -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/themes/vue.css">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">

  <style>
    /* ============================================================
       DESIGN TOKENS — change these to restyle the whole site
       ============================================================ */
    :root {
      --navy:          #0D1B3E;
      --navy-mid:      #162554;
      --navy-light:    #1E3272;
      --orange:        #F47B20;
      --orange-soft:   #FEF0E4;
      --orange-dark:   #D4620A;

      --bg:            #F0F3F9;
      --bg-content:    #FFFFFF;
      --border:        #DDE2EE;
      --border-light:  #EEF1F8;

      --text:          #1A2035;
      --text-muted:    #5A6480;

      --font-ui:       'Manrope', sans-serif;
      --font-body:     'Inter', sans-serif;

      --radius:        6px;
      --radius-lg:     10px;
    }

    /* ============================================================
       SIDEBAR
       ============================================================ */
    .sidebar {
      background: var(--navy) !important;
      border-right: none !important;
      padding-top: 0 !important;
    }

    .sidebar-nav {
      padding: 0 !important;
    }

    /* App name / course title */
    .app-name-link {
      font-family: var(--font-ui) !important;
      font-weight: 800 !important;
      font-size: 0.95rem !important;
      color: #FFFFFF !important;
      display: block !important;
      padding: 24px 20px !important;
      background: rgba(0,0,0,0.2) !important;
      border-bottom: 1px solid rgba(255,255,255,0.08) !important;
      text-decoration: none !important;
    }

    /* Search box */
    .search {
      padding: 12px 14px !important;
      border-bottom: 1px solid rgba(255,255,255,0.07) !important;
      margin-bottom: 8px !important;
    }

    .search input {
      background: rgba(255,255,255,0.08) !important;
      border: 1px solid rgba(255,255,255,0.14) !important;
      color: #FFFFFF !important;
      border-radius: var(--radius) !important;
      font-family: var(--font-body) !important;
      font-size: 0.8rem !important;
      padding: 7px 11px !important;
      width: 100% !important;
    }

    .search input::placeholder { color: rgba(255,255,255,0.3) !important; }
    .search input:focus {
      outline: none !important;
      border-color: var(--orange) !important;
    }

    /* Section group labels (bold items like "Module 1 — Fundamentals") */
    .sidebar-nav > ul > li > strong {
      display: block;
      font-family: var(--font-ui);
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--orange) !important;
      padding: 16px 20px 5px !important;
    }

    /* Top-level nav links */
    .sidebar-nav > ul > li > a {
      color: rgba(255,255,255,0.72) !important;
      font-family: var(--font-body) !important;
      font-size: 0.85rem !important;
      font-weight: 500 !important;
      padding: 6px 20px !important;
      display: block;
      border-left: 3px solid transparent !important;
      transition: all 0.15s !important;
    }

    .sidebar-nav > ul > li > a:hover {
      color: #FFFFFF !important;
      background: rgba(255,255,255,0.05) !important;
      text-decoration: none !important;
    }

    /* Active link */
    .sidebar-nav .active > a {
      color: #FFFFFF !important;
      background: rgba(244,123,32,0.15) !important;
      border-left-color: var(--orange) !important;
    }

    /* Nested lesson links */
    .sidebar-nav ul ul li a {
      font-size: 0.76rem !important;
      color: rgba(255,255,255,0.38) !important;
      padding-left: 32px !important;
      font-weight: 400 !important;
    }

    .sidebar-nav ul ul li a:hover {
      color: rgba(255,255,255,0.7) !important;
      background: rgba(255,255,255,0.04) !important;
      text-decoration: none !important;
    }

    /* Sidebar toggle */
    .sidebar-toggle {
      background: var(--navy) !important;
    }
    .sidebar-toggle span {
      background-color: rgba(255,255,255,0.35) !important;
    }

    /* ============================================================
       MAIN CONTENT
       ============================================================ */
    body {
      font-family: var(--font-body) !important;
      background: var(--bg) !important;
      color: var(--text) !important;
    }

    .content {
      background: var(--bg) !important;
    }

    /* The actual content card */
    .markdown-section {
      max-width: 900px !important;
      background: var(--bg-content) !important;
      border-radius: var(--radius-lg) !important;
      box-shadow: 0 2px 20px rgba(13,27,62,0.08) !important;
      padding: 52px 64px 72px !important;
      margin: 32px auto !important;
    }

    @media (max-width: 900px) {
      .markdown-section {
        padding: 32px 24px 48px !important;
        margin: 16px !important;
      }
    }

    /* Navy + orange gradient stripe at top of content card */
    .markdown-section::before {
      content: '';
      display: block;
      height: 4px;
      background: linear-gradient(90deg, var(--navy), var(--orange));
      border-radius: var(--radius) var(--radius) 0 0;
      margin: -52px -64px 44px -64px;
    }

    /* ============================================================
       TYPOGRAPHY
       ============================================================ */
    .markdown-section h1 {
      font-family: var(--font-ui) !important;
      font-size: 2rem !important;
      font-weight: 800 !important;
      color: var(--navy) !important;
      letter-spacing: -0.03em !important;
      line-height: 1.2 !important;
      margin-bottom: 12px !important;
      border-bottom: none !important;
      padding-bottom: 0 !important;
    }

    /* Module info bar after H1 */
    .markdown-section h1 + blockquote {
      background: var(--navy) !important;
      border-left: none !important;
      border-radius: var(--radius) !important;
      padding: 12px 20px !important;
      margin: 14px 0 44px !important;
    }

    .markdown-section h1 + blockquote p {
      color: rgba(255,255,255,0.72) !important;
      font-size: 0.82rem !important;
      margin: 0 !important;
    }

    .markdown-section h1 + blockquote strong {
      color: #FFFFFF !important;
    }

    /* H2 — Lesson section headers */
    .markdown-section h2 {
      font-family: var(--font-ui) !important;
      font-size: 1.25rem !important;
      font-weight: 700 !important;
      color: var(--navy) !important;
      border-bottom: none !important;
      border-left: 4px solid var(--navy) !important;
      background: var(--bg) !important;
      padding: 14px 18px !important;
      margin: 56px 0 20px !important;
      border-radius: 0 var(--radius) var(--radius) 0 !important;
      letter-spacing: -0.01em !important;
    }

    /* H3 — Subsection */
    .markdown-section h3 {
      font-family: var(--font-ui) !important;
      font-size: 1rem !important;
      font-weight: 700 !important;
      color: var(--navy) !important;
      margin: 32px 0 10px !important;
      padding-bottom: 8px !important;
      border-bottom: 1px solid var(--border-light) !important;
      letter-spacing: -0.01em !important;
    }

    /* H4 — sub-labels */
    .markdown-section h4 {
      font-family: var(--font-body) !important;
      font-size: 0.7rem !important;
      font-weight: 600 !important;
      color: var(--text-muted) !important;
      text-transform: uppercase !important;
      letter-spacing: 0.09em !important;
      margin: 22px 0 8px !important;
    }

    .markdown-section p {
      font-size: 0.945rem !important;
      line-height: 1.78 !important;
      color: var(--text) !important;
      margin-bottom: 14px !important;
    }

    .markdown-section a {
      color: var(--navy) !important;
      font-weight: 500 !important;
      border-bottom: 1.5px solid var(--border) !important;
      text-decoration: none !important;
      transition: color 0.15s, border-color 0.15s !important;
    }

    .markdown-section a:hover {
      color: var(--orange) !important;
      border-bottom-color: var(--orange) !important;
    }

    .markdown-section strong {
      font-weight: 600 !important;
      color: var(--navy) !important;
    }

    .markdown-section hr {
      border: none !important;
      border-top: 1px solid var(--border-light) !important;
      margin: 40px 0 !important;
    }

    /* ============================================================
       BLOCKQUOTES
       ============================================================ */
    .markdown-section blockquote {
      border-left: 4px solid var(--orange) !important;
      background: var(--orange-soft) !important;
      padding: 13px 18px !important;
      border-radius: 0 var(--radius) var(--radius) 0 !important;
      margin: 20px 0 !important;
    }

    .markdown-section blockquote p {
      font-size: 0.875rem !important;
      line-height: 1.6 !important;
      margin: 0 !important;
      color: var(--text) !important;
    }

    /* ============================================================
       TABLES
       ============================================================ */
    .markdown-section table {
      width: 100% !important;
      border-collapse: collapse !important;
      margin: 20px 0 !important;
      font-size: 0.865rem !important;
      border-radius: var(--radius-lg) !important;
      overflow: hidden !important;
      box-shadow: 0 0 0 1px var(--border) !important;
    }

    .markdown-section thead tr {
      background: var(--navy) !important;
      border-bottom: none !important;
    }

    .markdown-section thead th {
      color: rgba(255,255,255,0.88) !important;
      font-family: var(--font-ui) !important;
      font-size: 0.7rem !important;
      font-weight: 700 !important;
      letter-spacing: 0.08em !important;
      text-transform: uppercase !important;
      padding: 11px 16px !important;
      text-align: left !important;
      background: transparent !important;
      border: none !important;
    }

    .markdown-section tbody tr {
      border-bottom: 1px solid var(--border-light) !important;
      transition: background 0.1s !important;
    }

    .markdown-section tbody tr:nth-child(even) {
      background: var(--bg) !important;
    }

    .markdown-section tbody tr:hover {
      background: var(--orange-soft) !important;
    }

    .markdown-section tbody tr:last-child {
      border-bottom: none !important;
    }

    .markdown-section td {
      padding: 10px 16px !important;
      vertical-align: top !important;
      line-height: 1.5 !important;
      border: none !important;
    }

    .markdown-section td:first-child {
      font-weight: 500 !important;
      color: var(--navy) !important;
    }

    /* ============================================================
       LISTS
       ============================================================ */
    .markdown-section ul,
    .markdown-section ol {
      padding-left: 22px !important;
      margin-bottom: 14px !important;
    }

    .markdown-section li {
      font-size: 0.945rem !important;
      line-height: 1.65 !important;
      margin-bottom: 6px !important;
      color: var(--text) !important;
    }

    /* ============================================================
       CODE
       ============================================================ */
    .markdown-section code {
      font-size: 0.82rem !important;
      background: var(--bg) !important;
      color: var(--navy) !important;
      padding: 2px 7px !important;
      border-radius: 4px !important;
      border: 1px solid var(--border) !important;
      font-family: 'Courier New', monospace !important;
    }

    .markdown-section pre {
      background: var(--navy) !important;
      border-radius: var(--radius-lg) !important;
      padding: 20px 24px !important;
      margin: 16px 0 !important;
    }

    .markdown-section pre code {
      background: none !important;
      color: rgba(255,255,255,0.82) !important;
      border: none !important;
      font-size: 0.84rem !important;
    }

    /* ============================================================
       PAGINATION
       ============================================================ */
    .pagination-item a {
      font-family: var(--font-ui) !important;
      font-weight: 600 !important;
      font-size: 0.85rem !important;
      background: var(--navy) !important;
      color: #FFFFFF !important;
      border: none !important;
      border-radius: var(--radius) !important;
      padding: 10px 20px !important;
    }

    .pagination-item a:hover {
      background: var(--navy-light) !important;
      color: #FFFFFF !important;
    }

    /* ============================================================
       PROGRESS BAR
       ============================================================ */
    #nprogress .bar {
      background: var(--orange) !important;
      height: 3px !important;
    }

    /* ============================================================
       SCROLLBAR
       ============================================================ */
    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.15);
      border-radius: 4px;
    }

  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    window.$docsify = {
      name: '💡 Lighting Essentials',
      repo: '',
      loadSidebar: true,
      subMaxLevel: 2,
      auto2top: true,
      homepage: 'README.md',
      search: {
        placeholder: 'Search all modules...',
        noData: 'No results.',
        depth: 4,
      },
      pagination: {
        previousText: '← Previous',
        nextText: 'Next →',
        crossChapter: true,
        crossChapterText: true,
      },
      plugins: [
        /* Style ⚠️ blockquotes red automatically */
        function(hook) {
          hook.doneEach(function() {
            document.querySelectorAll('.markdown-section blockquote p').forEach(function(p) {
              if (p.textContent.trim().startsWith('⚠️')) {
                var bq = p.closest('blockquote');
                bq.style.borderLeftColor = '#C0392B';
                bq.style.background = '#FDF2F2';
              }
            });
          });
        }
      ]
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>

</body>
</html>
