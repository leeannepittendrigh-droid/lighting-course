<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Commercial Lighting Essentials</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💡</text></svg>">

  <!-- Docsify base theme -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/themes/vue.css">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">

  <style>
    /* ============================================================
       DESIGN TOKENS
       ============================================================ */
    :root {
      --navy:         #0D1B3E;
      --navy-mid:     #162554;
      --navy-light:   #1E3272;
      --orange:       #F47B20;
      --orange-soft:  #FEF0E4;
      --orange-dark:  #D4620A;
      --bg:           #F0F3F9;
      --bg-content:   #FFFFFF;
      --border:       #DDE2EE;
      --border-light: #EEF1F8;
      --text:         #1A2035;
      --text-muted:   #5A6480;
      --font-ui:      'Manrope', sans-serif;
      --font-body:    'Inter', sans-serif;
      --radius:       8px;
      --radius-lg:    12px;
      --shadow:       0 2px 20px rgba(13,27,62,0.09);
    }

    /* ============================================================
       BASE
       ============================================================ */
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: var(--font-body) !important;
      background: var(--bg) !important;
      color: var(--text) !important;
    }

    /* ============================================================
       NAVBAR
       ============================================================ */
    .app-nav {
      background: var(--navy) !important;
      padding: 0 40px !important;
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      right: 0 !important;
      height: 56px !important;
      display: flex !important;
      align-items: center !important;
      justify-content: space-between !important;
      z-index: 100 !important;
      box-shadow: 0 2px 12px rgba(0,0,0,0.2) !important;
      margin: 0 !important;
    }

    /* Course title on left of navbar */
    .app-nav::before {
      content: '💡 Commercial Lighting Essentials';
      font-family: var(--font-ui);
      font-weight: 800;
      font-size: 0.9rem;
      color: #FFFFFF;
      letter-spacing: -0.01em;
      white-space: nowrap;
    }

    .app-nav ul {
      display: flex !important;
      align-items: center !important;
      gap: 4px !important;
      list-style: none !important;
      margin: 0 !important;
      padding: 0 !important;
    }

    .app-nav li {
      margin: 0 !important;
      padding: 0 !important;
      position: relative !important;
    }

    .app-nav a {
      font-family: var(--font-body) !important;
      font-size: 0.82rem !important;
      font-weight: 500 !important;
      color: rgba(255,255,255,0.72) !important;
      padding: 6px 14px !important;
      border-radius: var(--radius) !important;
      text-decoration: none !important;
      transition: all 0.15s !important;
      white-space: nowrap !important;
    }

    .app-nav a:hover {
      color: #FFFFFF !important;
      background: rgba(255,255,255,0.1) !important;
    }

    /* Active nav item */
    .app-nav li.active > a,
    .app-nav a.active {
      color: #FFFFFF !important;
      background: rgba(244,123,32,0.25) !important;
      border: 1px solid rgba(244,123,32,0.4) !important;
    }

    /* ============================================================
       MAIN CONTENT LAYOUT
       — no sidebar, full width
       ============================================================ */
    .sidebar { display: none !important; }
    .sidebar-toggle { display: none !important; }

    .content {
      left: 0 !important;
      padding-top: 56px !important;
      background: var(--bg) !important;
    }

    .markdown-section {
      max-width: 960px !important;
      margin: 40px auto !important;
      padding: 56px 72px 80px !important;
      background: var(--bg-content) !important;
      border-radius: var(--radius-lg) !important;
      box-shadow: var(--shadow) !important;
    }

    /* Top gradient stripe */
    .markdown-section::before {
      content: '';
      display: block;
      height: 4px;
      background: linear-gradient(90deg, var(--navy), var(--orange));
      border-radius: var(--radius) var(--radius) 0 0;
      margin: -56px -72px 48px -72px;
    }

    @media (max-width: 1100px) {
      .markdown-section { padding: 48px 48px 64px !important; }
      .markdown-section::before { margin: -48px -48px 40px -48px; }
    }

    @media (max-width: 768px) {
      .app-nav { padding: 0 20px !important; }
      .app-nav::before { font-size: 0.78rem; }
      .app-nav a { font-size: 0.75rem !important; padding: 5px 10px !important; }
      .markdown-section { margin: 16px !important; padding: 32px 24px 48px !important; }
      .markdown-section::before { margin: -32px -24px 32px -24px; }
    }

    /* ============================================================
       HOME PAGE — MODULE CARDS
       ============================================================ */
    .course-intro {
      font-size: 1.05rem;
      color: var(--text-muted);
      line-height: 1.7;
      margin-bottom: 40px;
      max-width: 600px;
    }

    .module-cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      margin: 0 0 48px 0;
    }

    @media (max-width: 900px) {
      .module-cards { grid-template-columns: 1fr; }
    }

    .module-card {
      background: var(--bg-content);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 28px;
      display: flex;
      flex-direction: column;
      transition: box-shadow 0.2s, transform 0.2s;
      box-shadow: 0 1px 4px rgba(13,27,62,0.06);
    }

    .module-card:hover {
      box-shadow: 0 8px 32px rgba(13,27,62,0.12);
      transform: translateY(-2px);
    }

    .module-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .module-number {
      font-family: var(--font-ui);
      font-size: 2rem;
      font-weight: 800;
      color: var(--border);
      line-height: 1;
      letter-spacing: -0.04em;
    }

    .module-duration {
      font-family: var(--font-body);
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--text-muted);
      background: var(--bg);
      padding: 3px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
    }

    .module-card h3 {
      font-family: var(--font-ui) !important;
      font-size: 1.05rem !important;
      font-weight: 700 !important;
      color: var(--navy) !important;
      margin: 0 0 10px 0 !important;
      padding: 0 !important;
      border: none !important;
    }

    .module-card p {
      font-size: 0.875rem !important;
      color: var(--text-muted) !important;
      line-height: 1.6 !important;
      margin-bottom: 16px !important;
      flex-grow: 1;
    }

    .module-card ul {
      list-style: none !important;
      padding: 0 !important;
      margin: 0 0 24px 0 !important;
    }

    .module-card ul li {
      font-size: 0.8rem !important;
      color: var(--text-muted) !important;
      padding: 3px 0 !important;
      margin: 0 !important;
      padding-left: 16px !important;
      position: relative;
    }

    .module-card ul li::before {
      content: '→';
      position: absolute;
      left: 0;
      color: var(--orange);
      font-size: 0.75rem;
    }

    .module-card-btn {
      display: block;
      background: var(--navy) !important;
      color: #FFFFFF !important;
      text-align: center;
      padding: 10px 16px;
      border-radius: var(--radius);
      font-family: var(--font-ui) !important;
      font-weight: 700 !important;
      font-size: 0.82rem !important;
      text-decoration: none !important;
      border: none !important;
      transition: background 0.15s;
      margin-top: auto;
    }

    .module-card-btn:hover {
      background: var(--navy-light) !important;
      color: #FFFFFF !important;
      border: none !important;
    }

    /* Course meta bar */
    .course-meta {
      display: flex;
      gap: 32px;
      flex-wrap: wrap;
      background: var(--navy);
      border-radius: var(--radius);
      padding: 16px 24px;
      margin-top: 8px;
    }

    .course-meta-item {
      font-size: 0.82rem;
      color: rgba(255,255,255,0.72);
      font-family: var(--font-body);
    }

    .course-meta-item strong {
      color: #FFFFFF !important;
    }

    /* ============================================================
       PAGE TYPOGRAPHY
       ============================================================ */
    .markdown-section h1 {
      font-family: var(--font-ui) !important;
      font-size: 2rem !important;
      font-weight: 800 !important;
      color: var(--navy) !important;
      letter-spacing: -0.03em !important;
      line-height: 1.2 !important;
      margin-bottom: 12px !important;
      border-bottom: none !important;
      padding-bottom: 0 !important;
    }

    /* Module meta bar (> after h1) */
    .markdown-section h1 + blockquote {
      background: var(--navy) !important;
      border-left: none !important;
      border-radius: var(--radius) !important;
      padding: 12px 20px !important;
      margin: 14px 0 44px !important;
    }

    .markdown-section h1 + blockquote p {
      color: rgba(255,255,255,0.72) !important;
      font-size: 0.82rem !important;
      margin: 0 !important;
    }

    .markdown-section h1 + blockquote strong {
      color: #FFFFFF !important;
    }

    /* H2 — lesson section dividers */
    .markdown-section h2 {
      font-family: var(--font-ui) !important;
      font-size: 1.25rem !important;
      font-weight: 700 !important;
      color: var(--navy) !important;
      border-bottom: none !important;
      border-left: 4px solid var(--navy) !important;
      background: var(--bg) !important;
      padding: 14px 18px !important;
      margin: 56px 0 20px !important;
      border-radius: 0 var(--radius) var(--radius) 0 !important;
    }

    /* H3 */
    .markdown-section h3 {
      font-family: var(--font-ui) !important;
      font-size: 1.05rem !important;
      font-weight: 700 !important;
      color: #0D1B3E !important;
      margin: 36px 0 12px !important;
      padding-bottom: 9px !important;
      border-bottom: 2px solid var(--border) !important;
    }

    /* H4 */
    .markdown-section h4 {
      font-family: var(--font-ui) !important;
      font-size: 0.8rem !important;
      font-weight: 700 !important;
      color: #2A3F6F !important;
      text-transform: uppercase !important;
      letter-spacing: 0.07em !important;
      margin: 24px 0 8px !important;
      padding-left: 10px !important;
      border-left: 3px solid var(--orange) !important;
    }

    .markdown-section p {
      font-size: 0.945rem !important;
      line-height: 1.78 !important;
      color: var(--text) !important;
      margin-bottom: 14px !important;
    }

    .markdown-section a {
      color: var(--navy) !important;
      font-weight: 500 !important;
      border-bottom: 1.5px solid var(--border) !important;
      text-decoration: none !important;
      transition: color 0.15s, border-color 0.15s !important;
    }

    .markdown-section a:hover {
      color: var(--orange) !important;
      border-bottom-color: var(--orange) !important;
    }

    /* Override card links */
    .module-card a,
    .module-card-btn {
      border-bottom: none !important;
    }

    .markdown-section strong {
      font-weight: 600 !important;
      color: var(--navy) !important;
    }

    .markdown-section hr {
      border: none !important;
      border-top: 1px solid var(--border-light) !important;
      margin: 40px 0 !important;
    }

    /* ============================================================
       BLOCKQUOTES
       ============================================================ */
    .markdown-section blockquote {
      border-left: 4px solid var(--orange) !important;
      background: var(--orange-soft) !important;
      padding: 13px 18px !important;
      border-radius: 0 var(--radius) var(--radius) 0 !important;
      margin: 20px 0 !important;
    }

    .markdown-section blockquote p {
      font-size: 0.875rem !important;
      line-height: 1.6 !important;
      margin: 0 !important;
      color: var(--text) !important;
    }

    /* ============================================================
       TABLES
       ============================================================ */
    .markdown-section table {
      width: 100% !important;
      border-collapse: collapse !important;
      margin: 20px 0 !important;
      font-size: 0.865rem !important;
      border-radius: var(--radius-lg) !important;
      overflow: hidden !important;
      box-shadow: 0 0 0 1px var(--border) !important;
    }

    .markdown-section thead tr {
      background: var(--navy) !important;
      border-bottom: none !important;
    }

    .markdown-section thead th {
      color: rgba(255,255,255,0.88) !important;
      font-family: var(--font-ui) !important;
      font-size: 0.7rem !important;
      font-weight: 700 !important;
      letter-spacing: 0.08em !important;
      text-transform: uppercase !important;
      padding: 11px 16px !important;
      text-align: left !important;
      background: transparent !important;
      border: none !important;
    }

    .markdown-section tbody tr {
      border-bottom: 1px solid var(--border-light) !important;
      transition: background 0.1s !important;
    }

    .markdown-section tbody tr:nth-child(even) { background: var(--bg) !important; }
    .markdown-section tbody tr:hover { background: var(--orange-soft) !important; }
    .markdown-section tbody tr:last-child { border-bottom: none !important; }

    .markdown-section td {
      padding: 10px 16px !important;
      vertical-align: top !important;
      line-height: 1.5 !important;
      border: none !important;
    }

    .markdown-section td:first-child {
      font-weight: 500 !important;
      color: var(--navy) !important;
    }

    /* ============================================================
       LISTS
       ============================================================ */
    .markdown-section ul,
    .markdown-section ol {
      padding-left: 22px !important;
      margin-bottom: 14px !important;
    }

    .markdown-section li {
      font-size: 0.945rem !important;
      line-height: 1.65 !important;
      margin-bottom: 6px !important;
    }

    /* ============================================================
       CODE
       ============================================================ */
    .markdown-section code {
      font-size: 0.82rem !important;
      background: var(--bg) !important;
      color: var(--navy) !important;
      padding: 2px 7px !important;
      border-radius: 4px !important;
      border: 1px solid var(--border) !important;
      font-family: 'Courier New', monospace !important;
    }

    .markdown-section pre {
      background: var(--navy) !important;
      border-radius: var(--radius-lg) !important;
      padding: 20px 24px !important;
      margin: 16px 0 !important;
    }

    .markdown-section pre code {
      background: none !important;
      color: rgba(255,255,255,0.82) !important;
      border: none !important;
    }

    /* ============================================================
       PAGINATION
       ============================================================ */
    .pagination-item a {
      font-family: var(--font-ui) !important;
      font-weight: 600 !important;
      font-size: 0.85rem !important;
      background: var(--navy) !important;
      color: #FFFFFF !important;
      border: none !important;
      border-radius: var(--radius) !important;
      padding: 10px 20px !important;
      text-decoration: none !important;
    }

    .pagination-item a:hover {
      background: var(--navy-light) !important;
      color: #FFFFFF !important;
      border: none !important;
    }

    /* ============================================================
       PROGRESS BAR
       ============================================================ */
    #nprogress .bar {
      background: var(--orange) !important;
      height: 3px !important;
    }

  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    window.$docsify = {
      name: 'Commercial Lighting Essentials',
      repo: '',
      loadNavbar: true,
      loadSidebar: false,
      subMaxLevel: 0,
      auto2top: true,
      homepage: 'README.md',
      search: {
        placeholder: 'Search course content...',
        noData: 'No results.',
        depth: 4,
      },
      pagination: {
        previousText: '← Previous',
        nextText: 'Next →',
        crossChapter: true,
        crossChapterText: true,
      },
      plugins: [
        /* Style ⚠️ blockquotes red */
        function(hook) {
          hook.doneEach(function() {
            document.querySelectorAll('.markdown-section blockquote p').forEach(function(p) {
              if (p.textContent.trim().startsWith('⚠️')) {
                var bq = p.closest('blockquote');
                bq.style.borderLeftColor = '#C0392B';
                bq.style.background = '#FDF2F2';
              }
            });
          });
        }
      ]
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>

</body>
</html>
